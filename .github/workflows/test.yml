name: Test Compilation

on:
  push:
  workflow_call:

jobs:  
    test:
        runs-on: self-hosted
        steps:
        - name: Checkout code
          uses: actions/checkout@v5
        
        - name: Download repo_helper
          run: ./repo_config/download_release.sh -r dietwall/repo_helper
          env:
            TOKEN: ${{ secrets.REPO_HELPER_TOKEN }}

        - name: Download tcl_utils
          run: ./repo_config/download_release.sh -r dietwall/openocd-tcl-controller
          env:
            TOKEN: ${{ secrets.TCL_UTILS_TOKEN }}
        
        # we might do this with a standard dockerfile, or with repo_ops.py
