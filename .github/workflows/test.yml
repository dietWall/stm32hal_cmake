name: Test Compilation

on:
  push:

jobs:
    prepare:
        uses: ./.github/workflows/prepare.yml
        secrets: inherit
        
    compile:
        runs-on: self-hosted
        needs: prepare

        steps:
        - name: Checkout code
          uses: actions/checkout@v5
        
        - name: check container 
          run: docker container ls -a
        
        - name: run pytest
          run: docker exec -it stm32hal "bash -c "source .venv_container/bin/activate && pytest -s -v {{ workspace_dir }}/tests/test_hal_build.py --junit-xml=test_results_hal.xml"

        - name: run pytest
          run: docker exec -it stm32hal "bash -c "source .venv_container/bin/activate && pytest -s -v {{ workspace_dir }}/tests/test_compile_examples.py --junit-xml=test_results_examples.xml"

        - name: Publish Test Results
          uses: EnricoMi/publish-unit-test-result-action/linux@v2
          if: (!cancelled())
          with:
            files:  |
                test_results*.xml