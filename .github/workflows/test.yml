    build:
        runs-on: self-hosted
        needs: test
        steps:
        - name: Checkout code
          uses: actions/checkout@v5
        
        - name: setup ansible environment
          run: ./repo_config/setup_env.sh

        - name: Download dependencies
          run: ./repo_config/download.sh
          env:
            TCL_UTILS_TOKEN: ${{ secrets.TCL_UTILS_TOKEN }}
            REPO_HELPER_TOKEN: ${{ secrets.REPO_HELPER_TOKEN }}
        
        # we might do this with a standard dockerfile, or with repo_ops.py
