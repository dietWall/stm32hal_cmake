name: Build and Package

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_call:


jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/dietwall/arm_gcc_image:0.0.2

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Configure
      run: cmake -S . -B build

    - name: Build
      run: cmake --build build --config Release

    - name: Package
      run: cpack --config build/CPackConfig.cmake -G TGZ

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: hal-package
        path: build/*.tar.gz
