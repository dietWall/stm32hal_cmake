name: Compile Tests

on:
  push:
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    permissions: write-all
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'
    
    - name: setup ansible environment
      run: ./repo_config/setup_env.sh
      env:
        TCL_UTILS_TOKEN: ${{ secrets.TCL_UTILS_TOKEN }}
        REPO_HELPER_TOKEN: ${{ secrets.REPO_HELPER_TOKEN }}
    
    - name: Start Container
      run: source repo_config/.venv_installation/bin/activate && ansible-playbook -c local repo_config/ansible/setup_container.yml

    - name: Archive Build Logs
      run: tar -czvf build_logs.tar.gz test_build/*/build_log.txt
    
    - name: Upload Build Logs
      uses: actions/upload-artifact@v6
      with:
          name: build_logs
          path: build_logs.tar.gz
    
    - name: publish test_results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: (!cancelled())
      with:
        files: |
          test_results_*.xml
            