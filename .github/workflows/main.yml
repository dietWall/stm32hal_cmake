name: Compile Tests

on:
  push:
  pull_request:
    branches: [ "master" ]
  workflow_call:

jobs:
  prepare_env:
    uses: ./.github/workflows/prepare_env.yml
    with:
      runner: "self-hosted"

  build:
    permissions: write-all
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'
    
    - name: Run HAL Compilation Tests
      run: |
        docker exec -t stm32hal bash -c "source /home/developer/workspace/.venv_container/bin/activate && pytest -s -v /home/developer/workspace/tests/test_hal_build.py --junit-xml=/home/developer/workspace/test_results_hal.xml"

    - name: Run Example Compilation Tests
      run: |
        docker exec -t stm32hal bash -c "source /home/developer/workspace/.venv_container/bin/activate && pytest -s -v /home/developer/workspace/tests/test_compile_examples.py --junit-xml=/home/developer/workspace/test_results_examples.xml"

    - name: Archive Build Logs
      run: tar -czvf build_logs.tar.gz test_build/*/build_log.txt
    
    - name: Upload Build Logs
      uses: actions/upload-artifact@v6
      with:
          name: build_logs
          path: build_logs.tar.gz
    
    - name: publish test_results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: (!cancelled())
      with:
        files: |
          test_results_*.xml