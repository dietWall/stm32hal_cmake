name: Compile Tests

on:
  push:
  pull_request:
    branches: [ "master" ]
  workflow_call:

jobs:
  login:
    runs-on: self-hosted
    permissions: 
      packages: read

    steps:
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Pull Image
      run: docker pull ghcr.io/dietwall/arm_gcc_image:0.0.2
