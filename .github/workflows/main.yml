name: First CI

on:
  push:
    branches: [ "feature/ci" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4
    
    - name: setup ansible environment
      run: ./repo_config/setup_env.sh
      env:
        TCL_UTILS_TOKEN: ${{ secrets.TCL_UTILS_TOKEN }}
        REPO_HELPER_TOKEN: ${{ secrets.REPO_HELPER_TOKEN }}


    # - name: start container
